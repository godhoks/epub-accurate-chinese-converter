name: Build exe

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pyinstaller
      - run: python -m pytest
      - run: pyinstaller --onefile --windowed --name "AccuChineseConv-${{ github.ref_name }}" --icon assets/icon.ico --add-data "assets/icon.ico;assets" main.py
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/AccuChineseConv-${{ github.ref_name }}.exe
